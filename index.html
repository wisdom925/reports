<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reports</title>
  <meta name="description" content="HTML reports generated by the html-report Claude skill.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <style>
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 antialiased font-sans">

<div class="max-w-3xl mx-auto px-6 py-16">
  <header class="flex items-start justify-between mb-10 gap-4">
    <div>
      <h1 class="text-3xl font-bold tracking-tight">Reports</h1>
      <p class="text-zinc-500 mt-1">HTML reports generated by the <a href="https://github.com" class="underline"><code>html-report</code></a> Claude skill.</p>
    </div>
    <button id="theme-toggle" class="px-3 py-1.5 rounded-md border border-zinc-300 dark:border-zinc-700 text-sm hover:bg-zinc-100 dark:hover:bg-zinc-800 shrink-0">
      ☼ / ☾
    </button>
  </header>

  <input id="filter" placeholder="Filter reports…"
    class="w-full mb-6 px-3 py-2 rounded-md border border-zinc-300 dark:border-zinc-700 bg-transparent focus:outline-none focus:ring-2 focus:ring-blue-500">

  <ul id="list" class="divide-y divide-zinc-200 dark:divide-zinc-800"></ul>

  <p id="empty" class="text-zinc-500 hidden py-12 text-center">
    No reports yet. Ask Claude to generate one with the <code>html-report</code> skill.
  </p>
</div>

<script>
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const dark = document.documentElement.classList.toggle('dark');
    localStorage.theme = dark ? 'dark' : 'light';
  });

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  fetch('reports/manifest.json', { cache: 'no-store' })
    .then(r => r.ok ? r.json() : [])
    .then(items => {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const filter = document.getElementById('filter');

      if (!Array.isArray(items) || !items.length) {
        empty.classList.remove('hidden');
        filter.classList.add('hidden');
        return;
      }
      items.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      list.innerHTML = items.map(it => `
        <li class="py-4">
          <a href="reports/${encodeURIComponent(it.file)}" class="block group">
            <div class="flex items-baseline justify-between gap-4">
              <h2 class="font-medium group-hover:underline">${escapeHTML(it.title || it.file)}</h2>
              <time class="text-sm text-zinc-500 shrink-0 tabular-nums">${escapeHTML(it.date || '')}</time>
            </div>
            ${it.description ? `<p class="text-sm text-zinc-500 mt-1">${escapeHTML(it.description)}</p>` : ''}
          </a>
        </li>
      `).join('');

      filter.addEventListener('input', () => {
        const q = filter.value.toLowerCase();
        let any = false;
        [...list.children].forEach(li => {
          const match = li.textContent.toLowerCase().includes(q);
          li.style.display = match ? '' : 'none';
          if (match) any = true;
        });
        empty.classList.toggle('hidden', any);
      });
    })
    .catch(() => {
      document.getElementById('empty').classList.remove('hidden');
      document.getElementById('filter').classList.add('hidden');
    });
</script>

</body>
</html>
